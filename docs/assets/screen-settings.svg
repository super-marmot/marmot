<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 660" width="320" height="660" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <clipPath id="screen5"><rect x="8" y="8" width="304" height="644" rx="36"/></clipPath>
  </defs>
  <rect x="2" y="2" width="316" height="656" rx="42" fill="#000000"/>
  <g clip-path="url(#screen5)">
    <rect x="8" y="8" width="304" height="644" fill="#FFFFFF"/>
    <text x="34" y="36" fill="#0D0D0D" font-size="12" font-weight="600">9:41</text>
    <rect x="256" y="26" width="24" height="12" rx="3" fill="none" stroke="#5D5D5D"/>
    <rect x="258" y="28" width="16" height="8" rx="1.5" fill="#5D5D5D"/>
    <!-- header -->
    <text x="24" y="74" fill="#5D5D5D" font-size="15">‹</text>
    <text x="120" y="74" fill="#0D0D0D" font-size="17" font-weight="600">Settings</text>

    <!-- appearance -->
    <text x="24" y="112" fill="#0D0D0D" font-size="14" font-weight="600">Appearance</text>
    <text x="24" y="130" fill="#9A9A9A" font-size="11">Dark, light, or follow your device setting.</text>
    <rect x="24" y="140" width="86" height="32" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="45" y="161" fill="#5D5D5D" font-size="12.5" font-weight="600">System</text>
    <rect x="117" y="140" width="86" height="32" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="145" y="161" fill="#5D5D5D" font-size="12.5" font-weight="600">Dark</text>
    <rect x="210" y="140" width="86" height="32" rx="8" fill="#0D0D0D"/>
    <text x="236" y="161" fill="#FFFFFF" font-size="12.5" font-weight="600">Light</text>

    <!-- temperature -->
    <text x="24" y="210" fill="#0D0D0D" font-size="14" font-weight="600">Temperature</text>
    <text x="24" y="228" fill="#9A9A9A" font-size="11">Higher = more creative</text>
    <circle cx="204" cy="214" r="15" fill="#F4F4F4" stroke="#E3E3E3"/>
    <text x="200" y="219" fill="#0D0D0D" font-size="14" font-weight="700">−</text>
    <text x="238" y="219" fill="#0D0D0D" font-size="13" font-weight="700" text-anchor="middle">0.70</text>
    <circle cx="272" cy="214" r="15" fill="#F4F4F4" stroke="#E3E3E3"/>
    <text x="267" y="219" fill="#0D0D0D" font-size="14" font-weight="700">+</text>

    <!-- max tokens -->
    <text x="24" y="268" fill="#0D0D0D" font-size="14" font-weight="600">Max response tokens</text>
    <text x="24" y="286" fill="#9A9A9A" font-size="11">Longest reply allowed</text>
    <circle cx="204" cy="272" r="15" fill="#F4F4F4" stroke="#E3E3E3"/>
    <text x="200" y="277" fill="#0D0D0D" font-size="14" font-weight="700">−</text>
    <text x="238" y="277" fill="#0D0D0D" font-size="13" font-weight="700" text-anchor="middle">1024</text>
    <circle cx="272" cy="272" r="15" fill="#F4F4F4" stroke="#E3E3E3"/>
    <text x="267" y="277" fill="#0D0D0D" font-size="14" font-weight="700">+</text>

    <!-- context length -->
    <text x="24" y="326" fill="#0D0D0D" font-size="14" font-weight="600">Context length</text>
    <text x="24" y="344" fill="#9A9A9A" font-size="11">Larger context remembers longer conversations.</text>
    <rect x="24" y="354" width="86" height="32" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="49" y="375" fill="#5D5D5D" font-size="12.5" font-weight="600">2048</text>
    <rect x="117" y="354" width="86" height="32" rx="8" fill="#0D0D0D"/>
    <text x="142" y="375" fill="#FFFFFF" font-size="12.5" font-weight="600">4096</text>
    <rect x="210" y="354" width="86" height="32" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="235" y="375" fill="#5D5D5D" font-size="12.5" font-weight="600">8192</text>

    <!-- system prompt -->
    <text x="24" y="424" fill="#0D0D0D" font-size="14" font-weight="600">System prompt</text>
    <rect x="24" y="436" width="272" height="76" rx="12" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="40" y="460" fill="#5D5D5D" font-size="12">You are a helpful assistant running locally</text>
    <text x="40" y="477" fill="#5D5D5D" font-size="12">on the user's phone. Be concise.</text>

    <!-- your data -->
    <text x="24" y="546" fill="#0D0D0D" font-size="14" font-weight="600">Your data</text>
    <rect x="24" y="558" width="272" height="42" rx="12" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="160" y="584" fill="#0D0D0D" font-size="14" font-weight="600" text-anchor="middle">Export all chats</text>
  </g>
</svg>
