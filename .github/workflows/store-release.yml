name: Store release

on:
  workflow_dispatch:
  push:
    tags: ['store-v*']

permissions:
  contents: read

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Validate EAS credentials
        run: |
          set -euo pipefail
          test -n "$EXPO_TOKEN" || { echo "Missing EXPO_TOKEN; configure EAS authentication before running a store release" >&2; exit 1; }
          npx eas-cli@21.0.2 whoami

      - name: Build and submit Android and iOS production builds
        run: npx eas-cli@21.0.2 build --platform all --profile production --auto-submit --non-interactive --wait
