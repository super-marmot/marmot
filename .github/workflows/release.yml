name: Release Android artifacts

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Pin npm 11
        run: npm install -g npm@11

      # llama.rn's postinstall downloads the prebuilt jniLibs used by the APK.
      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Configure production signing
        env:
          KEYSTORE_BASE64: ${{ secrets.MARMOT_ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.MARMOT_ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MARMOT_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MARMOT_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64" || { echo "Missing MARMOT_ANDROID_KEYSTORE_BASE64" >&2; exit 1; }
          test -n "$KEYSTORE_PASSWORD" || { echo "Missing MARMOT_ANDROID_KEYSTORE_PASSWORD" >&2; exit 1; }
          test -n "$KEY_ALIAS" || { echo "Missing MARMOT_ANDROID_KEY_ALIAS" >&2; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "Missing MARMOT_ANDROID_KEY_PASSWORD" >&2; exit 1; }
          KEYSTORE_PATH="$RUNNER_TEMP/marmot-upload.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          keytool -list -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null
          node scripts/configure-android-signing.mjs
          {
            echo "marmotReleaseStoreFile=$KEYSTORE_PATH"
            echo "marmotReleaseStorePassword=$KEYSTORE_PASSWORD"
            echo "marmotReleaseKeyAlias=$KEY_ALIAS"
            echo "marmotReleaseKeyPassword=$KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Build production Android artifacts
        working-directory: android
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Rename artifacts
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/marmot-v${VERSION}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "dist/marmot-v${VERSION}.aab"
          # Stable name gives the site a permanent direct-download URL:
          # https://github.com/stancsz/marmot/releases/latest/download/marmot.apk
          cp android/app/build/outputs/apk/release/app-release.apk dist/marmot.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/marmot.aab
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: marmot-android-production
          path: |
            dist/*.apk
            dist/*.aab

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.apk
            dist/*.aab
          generate_release_notes: true
