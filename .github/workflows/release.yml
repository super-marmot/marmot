name: Release APK

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# creating the GitHub Release needs contents:write (default token is read-only)
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Pin npm 11
        run: npm install -g npm@11

      # scripts stay ON here (unlike ci.yml): llama.rn's postinstall must
      # download the prebuilt jniLibs the APK links against
      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: '1'

      # Expo's template signs release builds with the checked-in debug
      # keystore — fine for sideloading and gives a stable signature across
      # builds. Before any store distribution, switch to a private keystore
      # held in repo secrets.
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename artifact
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/marmot-v${VERSION}.apk"
          # stable name gives the site a permanent direct-download URL:
          # github.com/stancsz/marmot/releases/latest/download/marmot.apk
          cp android/app/build/outputs/apk/release/app-release.apk dist/marmot.apk
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: marmot-apk
          path: dist/*.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
