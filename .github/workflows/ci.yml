name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # the lockfile is written by npm 11 — match it (node 22 bundles npm 10,
      # which reads the same lock more strictly and fails resolution)
      - name: Pin npm 11
        run: npm install -g npm@11

      # npm install, not npm ci: jest 30's wasm resolver fallback
      # (@unrs/resolver-binding-wasm32-wasi) pins nested @emnapi deps that
      # npm omits from any platform's lockfile, so `npm ci`'s completeness
      # check fails everywhere (reproduced locally; upstream npm quirk with
      # platform-optional packages). install reconciles from the same lock.
      # --ignore-scripts: llama.rn's postinstall downloads ~100 MB of native
      # artifacts needed only for device builds — jest, tsc, and the Metro
      # bundle don't touch them.
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx jest --ci

      - name: Android bundle
        run: npx expo export --platform android --output-dir /tmp/export-test
        env:
          EXPO_NO_TELEMETRY: '1'
